<form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
    <input type="email" formControlName = "username" name="email" id="email" placeholder="Email" required>
    <input type="password" formControlName ="password" name="password" id="password" placeholder="Password" required>
    <button type = "submit" [disabled]="form.valid || loading">
        {{loading ? 'Loging in...' : 'login'}}
    </button>
</form>
