<div class="container">
    <button class="add-button-btn">Add Book</button>
    <div class="radio-group">
        <input type="radio" id="all-books" name="books" value="allBooks">
        <label for="all-books">All books</label>

        <input type="radio" id="reading" name="books" value="reading">
        <label for="option2">Reading</label>

        <input type="radio" id="read" name="books" value="read">
        <label for="option3">Read</label>

        <input type="radio" id="buy" name="books" value="buy">
        <label for="option2">Buy</label>

        <input type="radio" id="finished" name="option" value="finished">
        <label for="option3">Finished</label>
    </div>
    <div class="library-div">
        <div class="library-book">
            <span class="book-title"></span>
            <span class="book-author"></span>
            <span class="book-emotion"></span>
            <span class="book-status"></span>
            <button class="edit-book"></button>
            <button class="delete-book"></button>
        </div>
    </div>
</div>
